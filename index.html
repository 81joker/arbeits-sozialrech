<script>
const Q = [

// ── 1 ──────────────────────────────────────────────────────────────────────
{q:"1.) Wie entsteht ein Arbeitsverhältnis und was muss den Arbeitnehmern ausgehändigt werden?",
opts:[
  "Ein Arbeitsverhältnis entsteht durch eine behördliche Genehmigung. Dem Arbeitnehmer muss ein Lohnzettel ausgehändigt werden.",
  "Ein Arbeitsverhältnis entsteht durch einen Arbeitsvertrag (Übereinkunft) zwischen Arbeitgeber und Arbeitnehmer. Dem Arbeitnehmer muss ein Dienstzettel ausgehändigt werden.",
  "Ein Arbeitsverhältnis entsteht durch einen Arbeitsvertrag (Übereinkunft) zwischen Arbeitgeber und Arbeitnehmer. Dem Arbeitnehmer muss ein Kollektivvertrag ausgehändigt werden.",
  "Ein Arbeitsverhältnis entsteht nur durch einen schriftlichen Vertrag. Dem Arbeitnehmer muss ein Dienstzettel ausgehändigt werden."
],correct:1,
explain:"Entsteht durch einen Arbeitsvertrag (Übereinkunft) — mündlich oder schriftlich. Dem Arbeitnehmer muss ein Dienstzettel ausgehändigt werden (nicht Lohnzettel, nicht Kollektivvertrag)."},

// ── 2 ──────────────────────────────────────────────────────────────────────
{q:"2.) Welche Pflichten haben Arbeitnehmer in einem Arbeitsverhältnis?",
opts:[
  "Arbeitspflicht, Sorgfaltspflicht, Haftpflicht, Treuepflicht, Weisungspflicht.",
  "Arbeitspflicht, Sorgfaltspflicht, Fürsorgepflicht, Treuepflicht, Weisungspflicht.",
  "Arbeitspflicht, Sorgfaltspflicht, Haftpflicht, Verschwiegenheitspflicht, Weisungspflicht.",
  "Arbeitspflicht, Anmeldepflicht, Haftpflicht, Treuepflicht, Weisungspflicht."
],correct:0,
explain:"Die 5 Pflichten des Arbeitnehmers: Arbeitspflicht, Sorgfaltspflicht, Haftpflicht, Treuepflicht, Weisungspflicht. Achtung: NICHT Fürsorgepflicht (das ist eine Arbeitgeberpflicht), NICHT Verschwiegenheitspflicht, NICHT Anmeldepflicht."},

// ── 3 ──────────────────────────────────────────────────────────────────────
{q:"3.) Welche Pflichten haben Arbeitgeber in einem Arbeitsverhältnis?",
opts:[
  "Anmeldepflicht, Fürsorgepflicht, Entgeltzahlungspflicht, Entgeltfortzahlungspflicht.",
  "Anmeldepflicht, Treuepflicht, Entgeltzahlungspflicht, Entgeltfortzahlungspflicht.",
  "Anmeldepflicht, Fürsorgepflicht, Lohnfortzahlungspflicht, Haftpflicht.",
  "Fürsorgepflicht, Sorgfaltspflicht, Entgeltzahlungspflicht, Weisungspflicht."
],correct:0,
explain:"Arbeitgeberpflichten: Anmeldepflicht (bei SV), Fürsorgepflicht (Wohl und Sicherheit), Entgeltzahlungspflicht (Gehalt pünktlich), Entgeltfortzahlungspflicht (gesetzlichen Urlaub gewähren). Treuepflicht und Sorgfaltspflicht sind Arbeitnehmerpflichten!"},

// ── 4 ──────────────────────────────────────────────────────────────────────
{q:"4.) Was ist die Sozialversicherung?",
opts:[
  "Eine Pflichtversicherung für jede arbeitstätige Person, umfasst: Kranken-, Unfall-, Pensionsversicherung und Arbeitslosenversicherung.",
  "Eine Pflichtversicherung für jede arbeitstätige Person, umfasst: Kranken-, Unfall-, Pensionsversicherung und Haftpflichtversicherung.",
  "Eine freiwillige Versicherung für Arbeitnehmer, umfasst: Kranken-, Unfall-, Pensionsversicherung und Arbeitslosenversicherung.",
  "Eine Pflichtversicherung nur für Vollzeitarbeitnehmer, umfasst: Kranken-, Unfall-, Pensionsversicherung und Arbeitslosenversicherung."
],correct:0,
explain:"Pflichtversicherung für JEDE arbeitstätige Person (nicht nur Vollzeit). Die 4 Bereiche: Kranken-, Unfall-, Pensionsversicherung und Arbeitslosenversicherung. NICHT Haftpflichtversicherung."},

// ── 5 ──────────────────────────────────────────────────────────────────────
{q:"5.) Welche Nachteile haben Arbeitnehmer, wenn sie zum Mindestlohn angemeldet sind, aber mehr verdienen?",
opts:[
  "Niedriges Krankengeld, niedriges Arbeitslosengeld, niedrige Pension, niedriges Urlaubsgeld.",
  "Niedriges Krankengeld, niedriges Arbeitslosengeld, niedrige Pension, niedrige Abfertigung.",
  "Kein Krankengeld, kein Arbeitslosengeld, keine Pension, kein Urlaubsgeld.",
  "Niedriges Krankengeld, niedriges Arbeitslosengeld, niedrige Pension, niedrige Lohnsteuerrückerstattung."
],correct:0,
explain:"Die 4 Nachteile: niedriges Krankengeld, niedriges Arbeitslosengeld, niedrige Pension, niedriges Urlaubsgeld. NICHT 'kein' (es gibt Leistungen, nur niedrige). NICHT Abfertigung oder Steuerrückerstattung."},

// ── 6 ──────────────────────────────────────────────────────────────────────
{q:"6.) Welche Nachteile haben Arbeitnehmer, wenn sie nicht angemeldet ('schwarz') arbeiten?",
opts:[
  "Sie sind nicht gegen Krankheit, Unfall und Arbeitslosigkeit versichert, aber die Pension bleibt erhalten.",
  "Sie verlieren alle Ansprüche nur wenn der Arbeitgeber erwischt wird.",
  "Nicht versichert gegen Krankheit, Unfall, Pension und Arbeitslosigkeit — verlieren alle Ansprüche auf soziale Absicherung und rechtlichen Schutz im Arbeitsverhältnis.",
  "Nicht versichert gegen Krankheit und Unfall — Pension und Arbeitslosengeld bleiben durch den Staat garantiert."
],correct:2,
explain:"Schwarzarbeit: nicht versichert gegen Krankheit, Unfall, Pension UND Arbeitslosigkeit — alle vier. Verlust aller Ansprüche auf soziale Absicherung und rechtlichen Schutz. Keine Ausnahmen."},

// ── 7 ──────────────────────────────────────────────────────────────────────
{q:"7.) Wie können Arbeitnehmer ein Arbeitsverhältnis beenden?",
opts:[
  "Kündigung / Vorzeitiger Austritt / Einvernehmliche Auflösung / Fristablauf / Auflösung in der Probezeit.",
  "Kündigung / Entlassung / Einvernehmliche Auflösung / Fristablauf / Auflösung in der Probezeit.",
  "Kündigung / Vorzeitiger Austritt / Einvernehmliche Auflösung / Fristablauf.",
  "Kündigung / Vorzeitiger Austritt / Einvernehmliche Auflösung / Tod / Auflösung in der Probezeit."
],correct:0,
explain:"Arbeitnehmer können beenden durch: Kündigung, vorzeitiger Austritt, einvernehmliche Auflösung, Fristablauf, Auflösung in der Probezeit. NICHT Entlassung (das ist Arbeitgeberrecht)!"},

// ── 8 ──────────────────────────────────────────────────────────────────────
{q:"8.) Wie können Arbeitgeber ein Arbeitsverhältnis beenden?",
opts:[
  "Kündigung / Entlassung / Einvernehmliche Auflösung / Zeitablauf / Auflösung in der Probezeit / Tod.",
  "Kündigung / Vorzeitiger Austritt / Einvernehmliche Auflösung / Zeitablauf / Auflösung in der Probezeit / Tod.",
  "Kündigung / Entlassung / Einvernehmliche Auflösung / Zeitablauf / Auflösung in der Probezeit.",
  "Kündigung / Entlassung / Einvernehmliche Auflösung / Fristablauf / Tod."
],correct:0,
explain:"Arbeitgeber können beenden: Kündigung, Entlassung, einvernehmliche Auflösung, Zeitablauf, Auflösung in der Probezeit, Tod. NICHT vorzeitiger Austritt (das ist Arbeitnehmerrecht). Tod gehört dazu!"},

// ── 9 ──────────────────────────────────────────────────────────────────────
{q:"9.) Erklären Sie: Kündigung",
opts:[
  "Einseitige Willenserklärung vom Arbeitgeber oder Arbeitnehmer — unter Einhaltung der gesetzlichen oder vertraglichen Kündigungsfrist.",
  "Einseitige Willenserklärung nur vom Arbeitgeber — unter Einhaltung der gesetzlichen oder vertraglichen Kündigungsfrist.",
  "Gegenseitige Willenserklärung von Arbeitgeber und Arbeitnehmer — unter Einhaltung der gesetzlichen Kündigungsfrist.",
  "Einseitige Willenserklärung vom Arbeitgeber oder Arbeitnehmer — ohne Einhaltung einer Kündigungsfrist bei wichtigem Grund."
],correct:0,
explain:"Kündigung = einseitige Willenserklärung, die entweder vom Arbeitnehmer ODER Arbeitgeber ausgehen kann (nicht nur einer Seite). Immer MIT Kündigungsfrist. Ohne Frist = Entlassung oder vorzeitiger Austritt."},

// ── 10 ──────────────────────────────────────────────────────────────────────
{q:"10.) Erklären Sie: Entlassung",
opts:[
  "Sofortige (fristlose) Auflösung durch den Arbeitgeber bei schwerwiegendem Grund — mündlich oder schriftlich.",
  "Sofortige (fristlose) Auflösung durch den Arbeitnehmer bei schwerwiegendem Grund — nur schriftlich.",
  "Auflösung durch den Arbeitgeber mit 2-wöchiger Frist bei schwerwiegendem Grund.",
  "Sofortige (fristlose) Auflösung durch den Arbeitgeber — auch ohne Angabe von Gründen möglich."
],correct:0,
explain:"Entlassung = sofortige (fristlose) Auflösung durch den ARBEITGEBER. Ein schwerwiegender Grund MUSS vorliegen. Kann mündlich oder schriftlich erfolgen. NICHT durch Arbeitnehmer (das ist vorzeitiger Austritt)."},

// ── 11 ──────────────────────────────────────────────────────────────────────
{q:"11.) Erklären Sie: vorzeitiger Austritt",
opts:[
  "Sofortige Auflösung durch den Arbeitnehmer aus einem wichtigen Grund — ohne Kündigungsfrist.",
  "Sofortige Auflösung durch den Arbeitgeber aus einem wichtigen Grund — ohne Kündigungsfrist.",
  "Auflösung durch den Arbeitnehmer aus einem wichtigen Grund — mit 2-wöchiger Frist.",
  "Sofortige Auflösung durch den Arbeitnehmer — auch ohne Angabe von Gründen möglich."
],correct:0,
explain:"Vorzeitiger Austritt = sofortige Auflösung durch den ARBEITNEHMER aus einem wichtigen Grund. NICHT durch Arbeitgeber (das wäre Entlassung). Immer ohne Frist."},

// ── 12 ──────────────────────────────────────────────────────────────────────
{q:"12.) Erklären Sie: einvernehmliche Auflösung eines Dienstverhältnisses",
opts:[
  "Gegenseitige Einigung von Arbeitnehmer und Arbeitgeber — jederzeit ohne Frist, mündlich oder schriftlich.",
  "Gegenseitige Einigung von Arbeitnehmer und Arbeitgeber — immer nur schriftlich, ohne Frist.",
  "Einseitige Erklärung des Arbeitgebers mit Zustimmung des Arbeitnehmers — ohne Frist.",
  "Gegenseitige Einigung von Arbeitnehmer und Arbeitgeber — unter Einhaltung der halben Kündigungsfrist."
],correct:0,
explain:"Einvernehmliche Auflösung = gegenseitige Einigung beider Parteien. Jederzeit möglich, ohne Frist, MÜNDLICH oder SCHRIFTLICH (nicht nur schriftlich). Keine halbe Frist nötig."},

// ── 13 ──────────────────────────────────────────────────────────────────────
{q:"13.) Erklären Sie: Zeitablauf eines Dienstverhältnisses",
opts:[
  "Befristetes Arbeitsverhältnis endet automatisch nach Ablauf der vereinbarten Zeit — ohne besondere Auflösungserklärung.",
  "Befristetes Arbeitsverhältnis endet automatisch nach Ablauf der vereinbarten Zeit — eine Kündigung ist trotzdem notwendig.",
  "Unbefristetes Arbeitsverhältnis endet nach 5 Jahren automatisch — ohne besondere Auflösungserklärung.",
  "Befristetes Arbeitsverhältnis verlängert sich automatisch, wenn keine Kündigung erfolgt."
],correct:0,
explain:"Zeitablauf: NUR bei befristeten Verträgen. Endet automatisch — OHNE besondere Auflösungserklärung, keine Kündigung nötig. Verlängert sich NICHT automatisch."},

// ── 14 ──────────────────────────────────────────────────────────────────────
{q:"14.) Wohin wenden sich Arbeitnehmer, wenn der Lohn nicht oder nicht vollständig ausbezahlt wird?",
opts:[
  "An die Arbeiterkammer und/oder das Arbeits- und Sozialgericht.",
  "An die Wirtschaftskammer und/oder das Handelsgericht.",
  "An das Arbeitsinspektorat und/oder das Arbeitsgericht.",
  "An die Gewerkschaft vida und/oder das Bezirksgericht."
],correct:0,
explain:"Korrekte Anlaufstellen: Arbeiterkammer (kostenlose Beratung) und/oder Arbeits- und Sozialgericht. NICHT Wirtschaftskammer (das ist die Arbeitgebervertretung), NICHT Arbeitsinspektorat (kontrolliert Schutzvorschriften)."},

// ── 15 ──────────────────────────────────────────────────────────────────────

  "Mindestlöhne und Gehälter / Arbeitszeit (inkl. Überstunden, Nachtarbeit) / Überstunden / Urlaub / Abfertigung.",

  "Mindestlöhne und Gehälter / Arbeitszeit / Überstunden / Urlaub / Steuern.",
  "Mindestlöhne und Gehälter / Arbeitszeit (inkl. Überstunden, Nachtarbeit) / Urlaub / Abfertigung / Krankenversicherung."
],correct:0,
explain:"KV regelt: Mindestlöhne/Gehälter, Arbeitszeit (inkl. Überstunden und Nachtarbeit), Überstunden, Urlaub, Abfertigung. NICHT Sozialversicherungsbeiträge, NICHT Steuern, NICHT Krankenversicherung separat."},

// ── 16 ──────────────────────────────────────────────────────────────────────

opts:[
  "Arbeitsvertrag: zwischen AN und AG, kann Besserstellungen enthalten, darf nur besser als KV sein. Kollektivvertrag: zwischen WKO und ÖGB-VIDA, regelt Mindeststandards, darf nur zugunsten der AN geändert werden.",
  "Arbeitsvertrag: zwischen AN und AG, kann Schlechterstellungen enthalten. Kollektivvertrag: zwischen WKO und ÖGB-VIDA, ist für beide Seiten verhandelbar.",
  "Arbeitsvertrag: zwischen AN und AG, kann Besserstellungen enthalten. Kollektivvertrag: zwischen Wirtschaftsministerium und ÖGB-VIDA, darf nur zugunsten der AN geändert werden.",

],correct:0,

// ═══════════════════════════════════════════════
//  STATE & LOGIC
// ═══════════════════════════════════════════════
let order=[], current=0, answered=false, correct=0, wrong=0, wrongSet=new Set(), mode='all';

function init(m){
  mode=m||'all'; current=0; correct=0; wrong=0; answered=false;
  order=(mode==='wrong'&&wrongSet.size>0)?[...wrongSet]:Q.map((_,i)=>i);
  updateStats(); render();
}
function shuffleQ(){
  mode='all'; setActive('m-shuffle'); current=0; correct=0; wrong=0; answered=false;
  order=Q.map((_,i)=>i).sort(()=>Math.random()-0.5);
  updateStats(); render();
}
function setMode(m){
  mode=m; wrongSet=new Set();
  setActive(m==='all'?'m-all':'m-wrong'); init(m);
}
function setActive(id){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(id); if(el)el.classList.add('active');
}
function render(){
  if(current>=order.length){showResult();return;}
  const idx=order[current], q=Q[idx];
  const pct=Math.round(((current+1)/order.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('top-info').textContent='Frage '+(current+1)+' von '+order.length;
  // Shuffle options for display but track correct answer
  const indices=[0,1,2,3];
  const shuffled=indices.sort(()=>Math.random()-0.5);
  const correctDisplay=shuffled.indexOf(q.correct);
  let html=`<div class="q-card"><div class="q-category">Arbeits- und Sozialrecht</div><div class="q-number">Frage ${current+1} von ${order.length}</div><div class="q-text">${q.q}</div>`;
  shuffled.forEach((origIdx,displayIdx)=>{
    html+=`<div class="option" id="opt${displayIdx}" onclick="pick(${displayIdx},${correctDisplay})"><div class="checkbox" id="cb${displayIdx}"></div><div class="opt-text">${q.opts[origIdx]}</div></div>`;
  });
  html+=`<div class="feedback" id="feedback"></div><div class="btn-row"><button class="btn btn-gold" id="btn-w" onclick="next()" disabled>Weiter</button></div></div>`;
  document.getElementById('quiz-area').innerHTML=html;
  answered=false;
}
function pick(chosen, correctDisplay){
  if(answered)return; answered=true;
  const idx=order[current], q=Q[idx];
  for(let j=0;j<4;j++){
    const el=document.getElementById('opt'+j), cb=document.getElementById('cb'+j);
    el.classList.add('disabled');
    if(j===chosen&&j===correctDisplay){el.classList.add('correct');cb.textContent='✓';}
    else if(j===chosen){el.classList.add('wrong');cb.textContent='✗';}
    else if(j===correctDisplay){el.classList.add('reveal');cb.textContent='✓';}
  }
  const fb=document.getElementById('feedback');
  if(chosen===correctDisplay){correct++;fb.className='feedback show ok';fb.textContent='✓ Richtig! — '+q.explain;}
  else{wrong++;wrongSet.add(idx);fb.className='feedback show ko';fb.textContent='✗ Falsch. — '+q.explain;}
  document.getElementById('btn-w').disabled=false;
  updateStats();
}
function next(){current++;render();}
function updateStats(){
  document.getElementById('s-total').textContent=current;
  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-wrong').textContent=wrong;
}
function showResult(){
  const total=order.length, pct=Math.round((correct/total)*100), pass=pct>=75;
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('top-info').textContent='Fertig!';
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-wrong').textContent=wrong;
  document.getElementById('quiz-area').innerHTML=`<div class="q-card result-screen">
    <div class="q-category">Ergebnis</div>
    <div class="big">${correct}/${total}</div>
    <div class="sub">${pct}% richtig beantwortet</div>
    <div class="pass-badge ${pass?'pass':'fail'}">${pass?'✓ Bestanden':'✗ Nicht bestanden'}</div>
    <div style="margin-top:24px;font-size:14px;color:#666;line-height:1.7">${wrong>0?`Du hast <strong>${wrong}</strong> Fragen falsch beantwortet.<br>Klicke <em>"Nur Falsche"</em> um sie nochmal zu üben!`:'Perfekt! Alle Fragen richtig beantwortet 🎉'}</div>
    <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-gold" onclick="init('all')">Nochmal (alle) ↺</button>
      ${wrong>0?`<button class="btn btn-blue" onclick="setMode('wrong')">Nur Falsche üben</button>`:''}
    </div>
  </div>`;
}
init('all');
</script>
